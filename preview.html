<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>요한 묵시록 깊은 묵상</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 10%, #d9d2ff 0, transparent 30%),
    radial-gradient(circle at 85% 0%, #ffe7b8 0, transparent 32%),
    linear-gradient(135deg,#f8f5ff,#fff7ec);
  color:#1f1f22;
  padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
}
.app{width:min(640px,100%);margin:0 auto}
header{text-align:center;padding:16px 0 12px}
.emoji{font-size:38px;margin-bottom:8px}
header h2{margin:0;font-size:29px;letter-spacing:-.8px}
header p{margin:7px 0 0;color:#777;font-size:15px}
.card{
  background:rgba(255,255,255,.94);
  border-radius:34px;
  box-shadow:0 18px 55px rgba(40,40,70,.16);
  padding:26px 22px 22px;
}
.topline{display:flex;justify-content:space-between;color:#8a7da8;font-weight:900;font-size:13px}
h1{margin:20px 0 6px;font-size:40px;line-height:1.05;letter-spacing:-1.5px;text-align:center}
.subtitle{margin:0 0 22px;text-align:center;color:#777;font-size:16px;font-weight:700;word-break:keep-all}
.question{
  min-height:170px;
  background:#f0eaff;
  border-radius:28px;
  padding:26px 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:24px;
  line-height:1.5;
  font-weight:900;
  word-break:keep-all;
}
.memoWrap{margin-top:18px}
label{display:block;color:#666;font-weight:900;font-size:15px;margin:0 0 8px 4px}
textarea{
  width:100%;
  min-height:128px;
  border:0;
  outline:none;
  resize:vertical;
  border-radius:22px;
  background:#f7f3ee;
  padding:16px;
  font-size:18px;
  line-height:1.45;
  font-family:inherit;
}
.status{min-height:24px;color:#777;font-size:14px;margin:8px 0 0 4px}
.buttons{display:flex;gap:12px;justify-content:center;margin-top:16px}
button{
  flex:1;
  max-width:190px;
  border:0;
  border-radius:19px;
  padding:16px 12px;
  font-size:19px;
  font-weight:900;
}
.light{background:#ebe5dc;color:#222}
.dark{background:#272031;color:white}
.jump{
  margin-top:18px;
  background:rgba(255,255,255,.58);
  border-radius:24px;
  padding:14px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
}
.jump button{
  max-width:none;
  padding:9px 0;
  border-radius:13px;
  background:rgba(255,255,255,.9);
  color:#333;
  font-weight:900;
  font-size:13px;
}
.jump button.active{background:#272031;color:white}
.jump button.done{box-shadow:inset 0 0 0 2px #272031}
.tip{text-align:center;color:#777;font-size:13px;line-height:1.45;margin:14px 4px 0}
@media(max-width:390px){
  h1{font-size:34px}
  .question{font-size:21px;min-height:155px}
  .jump{grid-template-columns:repeat(6,1fr)}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="emoji">🌌</div>
  <h2>요한 묵시록 깊은 묵상</h2>
  <p>하루 1장, 마음을 찌르는 질문 하나</p>
</header>

<main class="card">
  <div class="topline">
    <span id="dayLabel">DAY 1</span>
    <span id="countLabel">1/22</span>
  </div>
  <h1 id="chapter">요한 묵시록 1장</h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="question" id="question"></div>

  <div class="memoWrap">
    <label for="memo">오늘 묵상 메모</label>
    <textarea id="memo" placeholder="솔직하게 적어봐. 이 장에 자동 저장돼."></textarea>
    <div class="status" id="status">자동 저장 준비됨</div>
  </div>

  <div class="buttons">
    <button class="light" onclick="move(-1)">← 이전</button>
    <button class="dark" onclick="move(1)">다음 →</button>
  </div>
</main>

<nav class="jump" id="jump"></nav>
<p class="tip">검은 테두리 숫자는 메모가 있는 장, 진한 숫자는 현재 장이야.</p>
</div>

<script>
const data = [{"chapter": "1장", "question": "나는 예수님을 실제로 만난다면 기쁠까, 두려울까? 왜?", "subtitle": "그리스도의 현현과 교회에 보내는 말씀의 시작"}, {"chapter": "2장", "question": "나는 신앙을 시작했을 때의 나와 지금의 내가 어떻게 달라졌다고 느끼나?", "subtitle": "일곱 교회에 대한 칭찬과 책망"}, {"chapter": "3장", "question": "나는 신앙을 “적당히” 유지하고 있진 않나? 그게 왜 편할까?", "subtitle": "사르디스, 필라델피아, 라오디케이아 교회"}, {"chapter": "4장", "question": "나는 하느님이 중심인 삶을 살고 있나, 내가 중심인가?", "subtitle": "하늘 어좌와 하느님의 거룩함"}, {"chapter": "5장", "question": "나는 진짜로 예수님이 내 삶의 “주인”이라고 생각하나?", "subtitle": "봉인된 두루마리와 어린양"}, {"chapter": "6장", "question": "세상의 고통을 볼 때 나는 하느님을 더 찾게 되나, 멀어지게 되나?", "subtitle": "일곱 봉인의 시작과 세상의 혼란"}, {"chapter": "7장", "question": "나는 하느님께 속해 있다는 확신이 흔들린 적이 있나?", "subtitle": "인장을 받은 이들과 큰 무리"}, {"chapter": "8장", "question": "나는 기도를 습관처럼 하나, 아니면 진짜 대화라고 느끼나?", "subtitle": "성도들의 기도와 나팔 재앙의 시작"}, {"chapter": "9장", "question": "나는 반복적으로 빠지는 죄가 있다면 그걸 진지하게 싸우고 있나?", "subtitle": "재앙 속에서도 회개하지 않는 사람들"}, {"chapter": "10장", "question": "하느님의 말씀이 내 삶에서 불편했던 순간은 언제였나?", "subtitle": "작은 두루마리, 달지만 쓴 말씀"}, {"chapter": "11장", "question": "나는 믿음을 지키기 위해 불편함을 감수한 적이 있나?", "subtitle": "두 증인과 하느님의 나라 선포"}, {"chapter": "12장", "question": "나는 내 삶에서 “보이지 않는 싸움”이 있다는 걸 얼마나 의식하고 있나?", "subtitle": "여인과 용, 영적 싸움"}, {"chapter": "13장", "question": "나는 세상의 기준을 따라갈 때가 더 많나, 신앙을 따를 때가 더 많나?", "subtitle": "짐승의 권세와 유혹"}, {"chapter": "14장", "question": "나는 하느님 편에 서는 선택을 할 때 무엇이 가장 걸리나?", "subtitle": "어린양을 따르는 이들과 심판의 경고"}, {"chapter": "15장", "question": "나는 하느님의 정의를 믿지만, 동시에 두려워한 적도 있나?", "subtitle": "마지막 재앙을 앞둔 찬양"}, {"chapter": "16장", "question": "고난이 올 때 나는 하느님께 더 가까워지나, 원망하나?", "subtitle": "일곱 대접 재앙"}, {"chapter": "17장", "question": "나는 겉으로 화려하지만 속은 비어있는 것에 끌린 적 있나?", "subtitle": "큰 바빌론의 유혹"}, {"chapter": "18장", "question": "내가 내려놓기 가장 어려운 것은 무엇인가?", "subtitle": "바빌론의 멸망과 세상의 집착"}, {"chapter": "19장", "question": "나는 하느님의 승리를 “머리로만” 믿나, “기대하며” 살고 있나?", "subtitle": "어린양의 혼인 잔치와 승리"}, {"chapter": "20장", "question": "나는 내 삶이 언젠가 평가받는다는 걸 의식하며 살고 있나?", "subtitle": "마지막 심판"}, {"chapter": "21장", "question": "나는 지금 삶보다 더 좋은 “하느님과 함께하는 삶”을 진짜 바라고 있나?", "subtitle": "새 하늘과 새 땅"}, {"chapter": "22장", "question": "오늘 하루, 나는 하느님과 얼마나 가까웠다고 느끼나?", "subtitle": "생명수의 강과 마지막 초대"}];
let index = Number(localStorage.getItem("revelation_deep_current_day") || "0");
if (isNaN(index) || index < 0 || index >= data.length) index = 0;

const memo = document.getElementById("memo");
const status = document.getElementById("status");

function key(i) {
  return "revelation_deep_memo_" + (i + 1);
}

function renderJump() {
  const jump = document.getElementById("jump");
  jump.innerHTML = "";
  data.forEach((_, i) => {
    const b = document.createElement("button");
    b.textContent = i + 1;
    b.onclick = () => go(i);
    if (i === index) b.classList.add("active");
    if ((localStorage.getItem(key(i)) || "").trim()) b.classList.add("done");
    jump.appendChild(b);
  });
}

function render() {
  const item = data[index];
  document.getElementById("dayLabel").textContent = "DAY " + (index + 1);
  document.getElementById("countLabel").textContent = (index + 1) + "/22";
  document.getElementById("chapter").textContent = "요한 묵시록 " + item.chapter;
  document.getElementById("subtitle").textContent = item.subtitle;
  document.getElementById("question").textContent = item.question;
  memo.value = localStorage.getItem(key(index)) || "";
  localStorage.setItem("revelation_deep_current_day", String(index));
  status.textContent = "이 장의 메모를 불러왔어";
  renderJump();
}

function saveMemo() {
  localStorage.setItem(key(index), memo.value);
  localStorage.setItem("revelation_deep_current_day", String(index));
  status.textContent = "자동 저장됨 👍";
  renderJump();
}

function go(i) {
  saveMemo();
  index = i;
  render();
}

function move(step) {
  saveMemo();
  index = (index + step + data.length) % data.length;
  render();
}

let timer = null;
memo.addEventListener("input", () => {
  status.textContent = "저장 중...";
  clearTimeout(timer);
  timer = setTimeout(saveMemo, 300);
});

render();
</script>
</body>
</html>
