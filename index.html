<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>성경 묵상 앱</title>
<link rel="apple-touch-icon" sizes="180x180" href="https://jungjimi78.github.io/bile-app/apple-touch-icon.png?v=99">
<meta name="apple-mobile-web-app-title" content="성경 묵상">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2f2f7">
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@500;700;900&display=swap');

:root{
  --bg:#f6f1e9;
  --paper:#fffdf8;
  --ink:#1f1c18;
  --muted:#8c8173;
  --soft:#f4eadc;
  --accent:#7b5b3a;
  --accent2:#a7835a;
  --purple:#7562a8;
  --shadow:0 18px 50px rgba(77,55,35,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  background:
    radial-gradient(circle at 12% 0%, rgba(255,226,178,.85) 0, transparent 30%),
    radial-gradient(circle at 90% 10%, rgba(216,204,255,.7) 0, transparent 28%),
    linear-gradient(180deg,#faf6ef 0%,#f1ebe2 100%);
  font-family:"Gowun Dodum",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",Arial,sans-serif;
  color:var(--ink);
}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:720px;margin:0 auto}
.head{
  position:sticky;
  top:0;
  z-index:5;
  background:rgba(250,246,239,.82);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:18px 18px 14px;
  border-bottom:1px solid rgba(110,82,50,.08);
}
.title{display:flex;gap:12px;align-items:center}
.icon{
  width:46px;height:46px;
  background:linear-gradient(135deg,#fffdf8,#f2e3cd);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(96,69,40,.14);
  font-size:25px;
}
h1{
  margin:0;
  font-family:"Noto Serif KR",serif;
  font-size:29px;
  font-weight:900;
  letter-spacing:-.8px;
}
.sub{
  margin:7px 0 0 58px;
  color:var(--muted);
  font-size:14px;
}
.screen{padding:18px 16px 34px}
#home{display:block}
#reader{display:none;padding:16px}
.book{
  display:flex;
  gap:15px;
  align-items:center;
  background:rgba(255,253,248,.93);
  border:0;
  border-radius:28px;
  padding:18px;
  margin-bottom:15px;
  width:100%;
  color:var(--ink);
  text-align:left;
  box-shadow:var(--shadow);
  transform:translateY(0);
  transition:transform .18s ease, box-shadow .18s ease;
}
.book:active{transform:scale(.985) translateY(1px);box-shadow:0 8px 24px rgba(77,55,35,.10)}
.bicon{
  width:60px;height:60px;
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:31px;
  background:linear-gradient(135deg,#fff1d2,#d6a96e);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);
}
.bicon.p{background:linear-gradient(135deg,#eee8ff,#b8a6f5)}
.bt{
  font-family:"Noto Serif KR",serif;
  font-size:23px;
  font-weight:900;
  letter-spacing:-.5px;
}
.bd{color:var(--muted);font-size:14px;margin-top:4px;line-height:1.4}
.bm{color:var(--accent);font-size:13px;font-weight:900;margin-top:9px}

.top{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px}
.back{
  border:0;
  background:rgba(255,253,248,.78);
  color:var(--accent);
  border-radius:999px;
  padding:10px 14px;
  font-weight:900;
  font-size:16px;
  box-shadow:0 8px 24px rgba(77,55,35,.08);
}
.badge{
  background:rgba(255,253,248,.82);
  border-radius:999px;
  padding:9px 13px;
  color:var(--muted);
  font-weight:900;
  font-size:14px;
  box-shadow:0 8px 24px rgba(77,55,35,.08);
}
.written{
  background:rgba(255,253,248,.9);
  border-radius:999px;
  width:max-content;
  max-width:100%;
  margin:0 auto 15px;
  padding:10px 15px;
  box-shadow:0 8px 24px rgba(77,55,35,.08);
  color:var(--muted);
  font-weight:900;
  font-size:14px;
}
.ch{
  background:rgba(255,253,248,.96);
  border-radius:32px;
  padding:26px 21px;
  text-align:center;
  box-shadow:var(--shadow);
  animation:rise .35s ease both;
}
.day{
  color:var(--accent2);
  font-weight:900;
  font-size:13px;
  letter-spacing:.4px;
}
.ch h2{
  font-family:"Noto Serif KR",serif;
  font-size:37px;
  margin:13px 0 7px;
  letter-spacing:-1.2px;
  line-height:1.1;
}
.ch p{
  margin:0;
  color:var(--muted);
  font-weight:700;
  line-height:1.4;
}
.qcard{
  background:
    linear-gradient(135deg,rgba(255,246,229,.95),rgba(255,253,248,.98));
  border-radius:32px;
  padding:21px;
  margin:15px 0;
  box-shadow:var(--shadow);
  animation:fadeSlide .38s ease both;
}
.qcard.p{
  background:linear-gradient(135deg,rgba(243,239,255,.96),rgba(255,253,248,.98));
}
.ql{
  font-size:13px;
  color:var(--muted);
  font-weight:900;
  margin-bottom:8px;
}
.ex{
  font-size:17px;
  line-height:1.55;
  font-weight:700;
  color:#3a332b;
  word-break:keep-all;
}
.question{
  font-family:"Noto Serif KR",serif;
  font-size:23px;
  line-height:1.5;
  font-weight:900;
  word-break:keep-all;
}
.field,.jumpwrap{
  background:rgba(255,253,248,.95);
  border-radius:28px;
  padding:17px;
  margin:15px 0;
  box-shadow:0 12px 32px rgba(77,55,35,.09);
  animation:fadeSlide .42s ease both;
}
label{
  display:block;
  font-weight:900;
  margin-bottom:10px;
  color:#2b2722;
}
textarea{
  width:100%;
  min-height:118px;
  border:0;
  outline:0;
  background:#f4efe7;
  border-radius:20px;
  padding:15px;
  font-size:17px;
  line-height:1.5;
  font-family:"Gowun Dodum",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",Arial,sans-serif;
  color:var(--ink);
  transition:background .2s ease, box-shadow .2s ease, transform .2s ease;
}
textarea:focus{
  background:#fff9f0;
  box-shadow:0 0 0 3px rgba(167,131,90,.22);
}
.status{display:none}
.nav{
  display:flex;
  gap:12px;
  margin:18px 0;
}
.nav button{
  flex:1;
  border:0;
  border-radius:20px;
  padding:16px;
  font-weight:900;
  font-size:16px;
  transition:transform .16s ease, opacity .16s ease;
}
.nav button:active{transform:scale(.97);opacity:.85}
.pri{
  background:linear-gradient(135deg,#2a2119,#6d4f32);
  color:white;
  box-shadow:0 12px 30px rgba(77,55,35,.18);
}
.sec{
  background:rgba(255,253,248,.95);
  color:var(--ink);
  box-shadow:0 8px 24px rgba(77,55,35,.08);
}
.jump{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
}
.jump button{
  border:0;
  text-align:center;
  padding:10px 0;
  border-radius:14px;
  background:#f1eadf;
  color:#5b4b3b;
  font-weight:900;
  font-size:13px;
  transition:transform .14s ease, background .16s ease;
}
.jump button:active{transform:scale(.92)}
@keyframes rise{
  from{opacity:0;transform:translateY(12px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:390px){
  h1{font-size:26px}
  .sub{margin-left:58px}
  .ch h2{font-size:32px}
  .question{font-size:21px}
  .jump{grid-template-columns:repeat(6,1fr)}
}
</style>
</head><body>
<div class="app"><header class="head"><div class="title"><div class="icon">📖</div><h1>성경 묵상</h1></div><p class="sub">짧은 설명과 질문으로 하루 한 장씩</p></header>
<main id="home" class="screen"><div id="bookList"></div></main>
<section id="reader">
<div class="top"><button class="back" onclick="showHome()">‹ 책 선택</button><div class="badge" id="badge"></div></div>
<div class="written" id="writtenDate">작성일: 아직 없음</div>
<div class="ch"><div class="day" id="day"></div><h2 id="chapterTitle"></h2><p id="subtitle"></p></div>
<div class="qcard" id="qcard"><div class="ql">짧은 설명</div><div class="ex" id="explain"></div><div class="ql" style="margin-top:18px">오늘의 질문</div><div class="question" id="question"></div></div>
<div class="field"><label>마음에 와 닿은 성경구절</label><textarea id="verse" placeholder="마음에 남은 구절을 적어봐"></textarea><div class="status" id="verseStatus"></div></div>
<div class="field"><label>오늘 묵상 메모</label><textarea id="memo" placeholder="오늘 느낀 점을 적어봐"></textarea><div class="status" id="memoStatus"></div></div>
<div class="nav"><button class="sec" onclick="move(-1)">이전</button><button class="pri" onclick="move(1)">다음</button></div>
<div class="jumpwrap"><div class="ql">장 바로가기</div><div class="jump" id="jump"></div></div>
</section></div>

["15장", "하느님의 정의와 심판이 준비됨.", "나는 하느님의 정의를 믿지만 동시에 두려워한 적 있나?", "마지막 재앙을 앞둔 찬양"], ["16장", "재앙 속에서도 사람들은 하느님을 원망함.", "나는 힘들 때 하느님을 찾나, 원망하나?", "일곱 대접 재앙"], ["17장", "겉은 화려하지만 속은 타락한 세상.", "나는 겉모습에 속아 선택한 적 있나?", "큰 바빌론의 유혹"], ["18장", "세상의 것들이 결국 무너짐.", "내가 놓지 못하는 건 무엇인가?", "바빌론의 멸망과 세상의 집착"], ["19장", "하느님의 최종 승리.", "나는 그 승리를 ‘기대하며’ 살고 있나?", "어린양의 혼인 잔치와 승리"], ["20장", "마지막 심판.", "나는 내 삶이 평가받는다는 걸 의식하고 살고 있나?", "마지막 심판"], ["21장", "새 하늘과 새 땅.", "나는 지금 삶보다 하느님과 함께하는 삶을 더 기대하나?", "새 하늘과 새 땅"], ["22장", "마지막 초대. 지금 선택하라는 메시지.", "나는 지금 하느님께 가까워지고 있나?", "생명수의 강과 마지막 초대"]]}};
const lastBookKey="bible_last_book_v3";
const lastChapterKey="bible_last_chapter_v3";
let currentBook=localStorage.getItem(lastBookKey)||"samuel1";
let currentChapter=Number(localStorage.getItem(lastChapterKey)||"0");

function todayReal(){let d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function key(type,b,c){return "bible_chapter_based_"+type+"_"+b+"_"+(c+1)}
function saveCurrent(){
 if(!books[currentBook]) return;
 let verse=document.getElementById("verse").value;
 let memo=document.getElementById("memo").value;
 localStorage.setItem(key("verse",currentBook,currentChapter),verse);
 localStorage.setItem(key("memo",currentBook,currentChapter),memo);
 if(verse.trim()||memo.trim()) localStorage.setItem(key("date",currentBook,currentChapter),todayReal());
 localStorage.setItem(lastBookKey,currentBook);
 localStorage.setItem(lastChapterKey,String(currentChapter));
 updateWrittenDate();
}
function showHome(){saveCurrent();document.getElementById("reader").style.display="none";document.getElementById("home").style.display="block";renderHome()}
function openBook(b,c=0){saveCurrent();currentBook=b;currentChapter=c;localStorage.setItem(lastBookKey,b);localStorage.setItem(lastChapterKey,String(c));document.getElementById("home").style.display="none";document.getElementById("reader").style.display="block";renderReader()}
function move(step){saveCurrent();let total=books[currentBook].chapters.length;currentChapter=(currentChapter+step+total)%total;renderReader()}
function renderHome(){
 let out="";
 Object.keys(books).forEach(b=>{let book=books[b];let pc=b==="revelation"?" p":"";out+=`<button class="book" onclick="openBook('${b}',0)"><div class="bicon${pc}">${book.emoji}</div><div><div class="bt">${book.title}</div><div class="bd">${book.desc}</div><div class="bm">${book.chapters.length}장 · 눌러서 시작</div></div></button>`});
 document.getElementById("bookList").innerHTML=out;
}
function updateWrittenDate(){
 let d=localStorage.getItem(key("date",currentBook,currentChapter));
 document.getElementById("writtenDate").textContent=d ? "작성일: "+d : "작성일: 아직 없음";
}
function renderReader(){
 let book=books[currentBook]; if(!book) return;
 let ch=book.chapters[currentChapter]; let tone=currentBook==="revelation"?" p":"";
 document.getElementById("badge").textContent=book.emoji+" "+book.title;
 document.getElementById("day").textContent="DAY "+(currentChapter+1)+" · "+(currentChapter+1)+"/"+book.chapters.length;
 document.getElementById("chapterTitle").textContent=book.title+" "+ch[0];
 document.getElementById("subtitle").textContent=ch[3];
 document.getElementById("explain").textContent=ch[1];
 document.getElementById("question").textContent=ch[2];
 document.getElementById("qcard").className="qcard"+tone;
 document.getElementById("verse").value=localStorage.getItem(key("verse",currentBook,currentChapter))||"";
 document.getElementById("memo").value=localStorage.getItem(key("memo",currentBook,currentChapter))||"";
 document.getElementById("verseStatus").textContent="";
 document.getElementById("memoStatus").textContent="";
 updateWrittenDate();
 let jump="";
 for(let i=0;i<book.chapters.length;i++){jump+=`<button onclick="openBook('${currentBook}',${i})">${i+1}</button>`}
 document.getElementById("jump").innerHTML=jump;
}
document.getElementById("verse").addEventListener("input",()=>{saveCurrent();document.getElementById("verseStatus").textContent="구절 자동 저장됨"});
document.getElementById("memo").addEventListener("input",()=>{saveCurrent();document.getElementById("memoStatus").textContent="메모 자동 저장됨"});
renderHome();
openBook(currentBook,currentChapter);
</script>
</body></html>
