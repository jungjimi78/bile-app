 6px;letter-spacing:-1px}.ch p{margin:0;color:#777;font-weight:650}.qcard{background:linear-gradient(135deg,#fff5df,#fff);border-radius:30px;padding:20px;margin:14px 0;box-shadow:0 18px 45px #0001}.qcard.p{background:linear-gradient(135deg,#f0ecff,#fff)}.ql{font-size:13px;color:#777;font-weight:900;margin-bottom:8px}.ex{font-size:17px;line-height:1.5;font-weight:650;color:#333}.question{font-size:23px;line-height:1.45;font-weight:850;word-break:keep-all}.field,.jumpwrap{background:#fff;border-radius:26px;padding:16px;margin:14px 0;box-shadow:0 10px 30px #0000000e}label{display:block;font-weight:850;margin-bottom:10px}textarea{width:100%;min-height:112px;border:0;outline:0;background:#f2f2f7;border-radius:18px;padding:14px;font-size:17px;line-height:1.45;font-family:inherit}.status{color:#777;font-size:13px;min-height:22px;margin-top:8px}.nav{display:flex;gap:12px;margin:18px 0}.nav button{flex:1;border:0;border-radius:18px;padding:15px;font-weight:850;font-size:16px}.pri{background:#111;color:white}.sec{background:#fff;color:#111;box-shadow:0 8px 24px #0001}.jump{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.jump button{border:0;text-align:center;padding:10px 0;border-radius:13px;background:#f2f2f7;color:#333;font-weight:850;font-size:13px}.jump button.done{background:#e9f9ed;color:#166a2f;box-shadow:inset 0 0 0 1.5px #79d68c}@media(max-width:390px){h1{font-size:25px}.ch h2{font-size:32px}.question{font-size:21px}.jump{grid-template-columns:repeat(6,1fr)}}

<div class="app"><header class="head"><div class="title"><div class="icon">📖</div><h1>가족 성경 묵상</h1></div><p class="sub">짧은 설명과 질문으로 하루 한 장씩</p></header>

<script>
const books = {"samuel1": {"title": "사무엘상", "emoji": "👑", "desc": "다윗 이야기의 시작, 선택과 믿음의 흐름", "chapters": [["1장", "한나는 오랫동안 괴로워하면서도 하느님께 솔직하게 기도함.", "나는 힘들 때 사람한테만 말하고, 하느님께는 덜 말하고 있진 않나?", "한나의 기도와 사무엘의 탄생"], ["2장", "하느님은 세상의 기준이 아니라, 완전히 다른 기준으로 사람을 보심.", "나는 사람을 볼 때 겉으로 판단하는 습관이 있지 않나?", "한나의 찬가와 엘리 집안"], ["3장", "사무엘은 처음엔 하느님의 부르심을 알아듣지 못함.", "나는 하느님의 신호를 놓치고 있는 건 아닐까?", "사무엘이 부르심을 받음"], ["4장", "사람들이 하느님을 ‘이기기 위한 도구’처럼 사용하려다 실패함.", "나는 하느님을 필요할 때만 찾는 건 아닐까?", "계약 궤를 빼앗김"], ["5장", "하느님은 인간이 만든 우상과 비교될 수 없는 분임.", "내가 의지하고 있는 ‘가짜 안전감’은 뭐지?", "블레셋과 다곤 신상"], ["6장", "잘못을 깨달은 후에도 제대로 돌이키는 게 중요함.", "나는 잘못을 인정만 하고 행동은 안 바꾸는 건 아닐까?", "계약 궤가 돌아옴"], ["7장", "진심으로 돌아올 때 하느님이 도우심.", "나는 정말로 돌아온 적이 있나, 아니면 말만 했나?", "미츠파 회개와 승리"], ["8장", "사람들은 하느님보다 눈에 보이는 왕을 원함.", "나는 하느님보다 눈에 보이는 것에 더 의지하고 있나?", "이스라엘이 왕을 요구함"], ["9장", "하느님은 평범한 일 속에서도 계획을 이루심.", "나는 일상의 작은 일 속에서 하느님을 보고 있나?", "사울과 사무엘의 만남"], ["10장", "사울은 선택받았지만 두려움 때문에 숨음.", "나는 해야 할 일을 알면서도 피하고 있지 않나?", "사울이 왕으로 뽑힘"], ["11장", "사울이 처음엔 용기 있게 행동함.", "나는 도움 필요한 상황에서 바로 움직이는 편인가?", "사울이 암몬을 물리침"], ["12장", "사무엘은 끝까지 책임과 진실을 강조함.", "나는 내 선택에 대해 책임을 지고 있나?", "사무엘의 마지막 권고"], ["13장", "사울은 조급해서 하느님의 타이밍을 기다리지 못함.", "나는 기다리지 못해서 망친 일이 있나?", "사울의 성급한 제사"], ["14장", "요나탄은 믿음으로 과감하게 행동함.", "나는 확신이 없어도 믿고 행동해본 적이 있나?", "요나탄의 용기"], ["15장", "사울은 하느님의 말씀을 자기 방식대로 바꿈.", "나는 하느님 말씀을 내 편한 대로 바꾸고 있지 않나?", "사울의 불순종"], ["16장", "하느님은 겉모습이 아니라 중심을 보심.", "나는 사람을 볼 때 무엇을 기준으로 판단하나?", "다윗이 기름부음 받음"], ["17장", "다윗은 모두가 두려워하는 상황에서 믿음으로 나아감.", "내 앞에 있는 ‘골리앗’은 뭐고, 나는 피하고 있나?", "다윗과 골리앗"], ["18장", "사울은 다윗을 질투하기 시작함.", "나는 다른 사람의 성공을 불편하게 느낀 적 있나?", "다윗과 요나탄, 사울의 질투"], ["19장", "다윗은 억울한 상황에서도 도망쳐야 했음.", "나는 억울할 때 어떻게 반응하나?", "다윗이 사울에게서 도망침"], ["20장", "요나탄은 친구를 위해 희생함.", "나는 진짜 친구를 위해 손해 볼 수 있나?", "다윗과 요나탄의 우정"], ["21장", "다윗은 위기 속에서 흔들리는 모습을 보임.", "나는 위기 상황에서 나답게 행동하나?", "다윗이 놉과 가드로 감"], ["22장", "사울의 결정이 많은 사람을 죽게 만듦.", "내 선택이 다른 사람에게 미치는 영향을 생각하나?", "놉의 사제들이 죽임당함"], ["23장", "다윗은 계속 하느님께 물으며 결정함.", "나는 중요한 선택 전에 하느님께 물어보나?", "다윗이 크일라를 구함"], ["24장", "다윗은 복수할 기회가 있었지만 ["15장", "하느님의 정의와 심판이 준비됨.", "나는 하느님의 정의를 믿지만 동시에 두려워한 적 있나?", "마지막 재앙을 앞둔 찬양"], ["16장", "재앙 속에서도 사람들은 하느님을 원망함.", "나는 힘들 때 하느님을 찾나, 원망하나?", "일곱 대접 재앙"], ["17장", "겉은 화려하지만 속은 타락한 세상.", "나는 겉모습에 속아 선택한 적 있나?", "큰 바빌론의 유혹"], ["18장", "세상의 것들이 결국 무너짐.", "내가 놓지 못하는 건 무엇인가?", "바빌론의 멸망과 세상의 집착"], ["19장", "하느님의 최종 승리.", "나는 그 승리를 ‘기대하며’ 살고 있나?", "어린양의 혼인 잔치와 승리"], ["20장", "마지막 심판.", "나는 내 삶이 평가받는다는 걸 의식하고 살고 있나?", "마지막 심판"], ["21장", "새 하늘과 새 땅.", "나는 지금 삶보다 하느님과 함께하는 삶을 더 기대하나?", "새 하늘과 새 땅"], ["22장", "마지막 초대. 지금 선택하라는 메시지.", "나는 지금 하느님께 가까워지고 있나?", "생명수의 강과 마지막 초대"]]}};
const selectedKey="bible_selected_date_v2";
const lastBookKey="bible_last_book";
const lastChapterKey="bible_last_chapter";
let selectedDate=localStorage.getItem(selectedKey)||todayReal();
let currentBook=localStorage.getItem(lastBookKey)||"samuel1";
let currentChapter=Number(localStorage.getItem(lastChapterKey)||"0");

function todayReal(){let d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function key(type,b,c,d){return "bible_allinone_"+type+"_"+b+"_"+(c+1)+"_"+(d||selectedDate)}
function changeDate(v){saveCurrent();selectedDate=v||todayReal();localStorage.setItem(selectedKey,selectedDate);renderReader()}
function saveCurrent(){
 if(!books[currentBook]) return;
 localStorage.setItem(key("verse",currentBook,currentChapter),document.getElementById("verse").value);
 localStorage.setItem(key("memo",currentBook,currentChapter),document.getElementById("memo").value);
 localStorage.setItem(selectedKey,selectedDate);
 localStorage.setItem(lastBookKey,currentBook);
 localStorage.setItem(lastChapterKey,String(currentChapter));
}
function isDone(b,c){
 return ((localStorage.getItem(key("verse",b,c))||"").trim() || (localStorage.getItem(key("memo",b,c))||"").trim());
}
function showHome(){saveCurrent();document.getElementById("reader").style.display="none";document.getElementById("home").style.display="block";renderHome()}
function openBook(b,c=0){saveCurrent();currentBook=b;currentChapter=c;localStorage.setItem(lastBookKey,b);localStorage.setItem(lastChapterKey,String(c));document.getElementById("home").style.display="none";document.getElementById("reader").style.display="block";renderReader()}
function move(step){saveCurrent();let total=books[currentBook].chapters.length;currentChapter=(currentChapter+step+total)%total;renderReader()}
function renderHome(){
 let out="";
 Object.keys(books).forEach(b=>{let book=books[b];let pc=b==="revelation"?" p":"";out+=`<button class="book" onclick="openBook('${b}',0)"><div class="bicon${pc}">${book.emoji}</div><div><div class="bt">${book.title}</div><div class="bd">${book.desc}</div><div class="bm">${book.chapters.length}장 · 눌러서 시작</div></div></button>`});
 document.getElementById("bookList").innerHTML=out;
}
function renderReader(){
 let book=books[currentBook]; if(!book) return;
 let ch=book.chapters[currentChapter]; let tone=currentBook==="revelation"?" p":"";
 document.getElementById("datePicker").value=selectedDate;
 document.getElementById("badge").textContent=book.emoji+" "+book.title;
 document.getElementById("day").textContent="DAY "+(currentChapter+1)+" · "+(currentChapter+1)+"/"+book.chapters.length;
 document.getElementById("chapterTitle").textContent=book.title+" "+ch[0];
 document.getElementById("subtitle").textContent=ch[3];
 document.getElementById("explain").textContent=ch[1];
 document.getElementById("question").textContent=ch[2];
 document.getElementById("qcard").className="qcard"+tone;
 document.getElementById("verse").value=localStorage.getItem(key("verse",currentBook,currentChapter))||"";
 document.getElementById("memo").value=localStorage.getItem(key("memo",currentBook,currentChapter))||"";
 document.getElementById("verseStatus").textContent="구절 자동 저장 준비됨";
 document.getElementById("memoStatus").textContent="메모 자동 저장 준비됨";
 let jump="";
 for(let i=0;i<book.chapters.length;i++){jump+=`<button class="${isDone(currentBook,i)?"done":""}" onclick="openBook('${currentBook}',${i})">${i+1}</button>`}
 document.getElementById("jump").innerHTML=jump;
}
document.getElementById("verse").addEventListener("input",()=>{saveCurrent();document.getElementById("verseStatus").textContent="구절 자동 저장됨"});
document.getElementById("memo").addEventListener("input",()=>{saveCurrent();document.getElementById("memoStatus").textContent="메모 자동 저장됨"});
renderHome();
openBook(currentBook,currentChapter);
</script>
</body></html>
